<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Коллекция марок — Слизерин 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg:     #07130f;
    --green2: #3d9960;
    --green3: #5ec47e;
    --silver: #c2d8c8;
    --silver2:#e8f5ed;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--silver2);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: default;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 70%, rgba(30,100,60,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 20%, rgba(10,60,40,0.15) 0%, transparent 55%),
      radial-gradient(ellipse 100% 40% at 50% 100%, rgba(7,19,12,0.9) 0%, transparent 50%);
    animation: bgDrift 18s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes bgDrift {
    0%   { transform: scale(1) translate(0,0); }
    100% { transform: scale(1.03) translate(-1%,1%); }
  }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    padding: 2.8rem 2rem 1.4rem;
    background: linear-gradient(to bottom, rgba(2,6,4,0.99) 0%, rgba(3,9,6,0.97) 100%);
  }
  .header-inner { max-width: 860px; margin: 0 auto; text-align: right; }
  .header-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 700; line-height: 1.15; color: var(--silver2);
    text-shadow: 0 0 60px rgba(62,153,96,0.55), 0 0 120px rgba(62,153,96,0.25);
    margin-bottom: 0.45rem;
  }
  .header-title em {
    font-style: normal; color: var(--green3);
    text-shadow: 0 0 35px rgba(94,196,126,0.75), 0 0 70px rgba(94,196,126,0.35);
  }
  .header-sub { font-style: italic; font-size: 1.05rem; color: var(--silver); opacity: 0.75; }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 50;
    text-align: center; padding: 0.85rem 2rem;
    background: linear-gradient(
      to bottom,
      rgba(3,9,6,0.97)   0%,
      rgba(5,13,9,0.95)  30%,
      rgba(7,16,11,0.93) 60%,
      rgba(7,19,12,0.92) 100%
    );
    backdrop-filter: blur(6px);
    border-top: 1px solid rgba(62,153,96,0.28);
    border-bottom: 1px solid rgba(62,153,96,0.28);
  }
  nav ul { list-style: none; display: inline-flex; gap: 3rem; }
  nav a {
    font-family: 'Cinzel', serif; font-size: 0.72rem; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--silver); text-decoration: none;
    transition: color 0.3s, text-shadow 0.3s;
  }
  nav a:hover, nav a.active { color: var(--green3); text-shadow: 0 0 14px rgba(94,196,126,0.6); }

  /* ── INTRO ── */
  .page-intro {
    position: relative; z-index: 1;
    text-align: center; padding: 2rem 2rem 0.5rem;
    font-style: italic; color: var(--silver); opacity: 0.7; font-size: 1rem;
  }

  /* ── STAMP FIELD ── */
  #stamp-field {
    position: relative; z-index: 1;
    width: 100%; overflow: hidden;
    margin: 0 auto;
  }

  .stamp-item {
    position: absolute; cursor: pointer; user-select: none; will-change: transform;
  }
  .stamp-item img {
    display: block; width: 100%;
    filter: drop-shadow(0 5px 14px rgba(0,0,0,0.7)) drop-shadow(0 0 8px rgba(42,107,66,0.18));
    transition: filter 0.3s;
  }
  .stamp-item:hover img {
    filter: drop-shadow(0 8px 22px rgba(0,0,0,0.8)) drop-shadow(0 0 18px rgba(94,196,126,0.35));
  }

  /* ── WAVE BOBBING ── */
  @keyframes waveBob {
    0%   { transform: translate(0, 0) rotate(var(--rot)); }
    25%  { transform: translate(calc(var(--wave-dx) * 0.6), var(--wave-y1)) rotate(calc(var(--rot) + var(--wave-tilt))); }
    50%  { transform: translate(var(--wave-dx), var(--wave-y2)) rotate(var(--rot)); }
    75%  { transform: translate(calc(var(--wave-dx) * -0.4), var(--wave-y1)) rotate(calc(var(--rot) - var(--wave-tilt))); }
    100% { transform: translate(0, 0) rotate(var(--rot)); }
  }

  /* ── MODAL ── */
  #modal {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(4,12,8,0.88); backdrop-filter: blur(12px);
    align-items: center; justify-content: center;
  }
  #modal.open { display: flex; }
  #modal-inner {
    position: relative; text-align: center;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-width: 540px; width: 92%;
  }
  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
  #modal-img {
    width: 440px; max-width: 85vw;
    margin: 0 auto 1.5rem; display: block;
    border: none;
    outline: none;
    border-radius: 4px;
    filter:
      drop-shadow(0 0 40px rgba(62,153,96,0.45))
      drop-shadow(0 0 80px rgba(62,153,96,0.2))
      drop-shadow(0 14px 40px rgba(0,0,0,0.85));
  }
  .modal-sep {
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(62,153,96,0.45), transparent);
    margin: 0 auto 1rem;
  }
  #modal-name {
    font-family: 'Cinzel', serif; font-size: 1.15rem;
    color: var(--silver2); margin-bottom: 0.4rem; letter-spacing: 0.06em;
  }
  #modal-role { font-style: italic; font-size: 1rem; color: var(--green2); line-height: 1.5; }
  #modal-close {
    position: absolute; top: -0.6rem; right: -0.6rem;
    background: rgba(11,30,23,0.95); border: 1px solid rgba(62,153,96,0.3);
    color: var(--silver); width: 2.2rem; height: 2.2rem;
    border-radius: 50%; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, border-color 0.2s;
  }
  #modal-close:hover { color: var(--green3); border-color: var(--green3); }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 1; text-align: center; padding: 1.8rem;
    font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.3em;
    color: rgba(194,216,200,0.28); border-top: 1px solid rgba(62,153,96,0.1);
  }

  /* ── RIPPLE ── */
  .ripple-ring {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%); width: 0; height: 0;
    border: 1.5px solid transparent;
    animation: waterRipple var(--dur,1.4s) cubic-bezier(0.15,0.5,0.4,1) var(--delay,0s) forwards;
  }
  @keyframes waterRipple {
    0%   { width:4px; height:2px; opacity:0.8; border-width:1.5px; }
    40%  { opacity:0.5; }
    100% { width:var(--maxW,220px); height:var(--maxH,70px); opacity:0; border-width:0.5px; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) { .header-inner { text-align: center; } }
  @media (max-width: 640px) {
    header { padding: 2rem 1.2rem 1.2rem; }
    .header-title { font-size: clamp(1.35rem,6vw,1.9rem); }
    nav { padding: 0.75rem 1rem; }
    nav ul { gap: 1.4rem; }
    nav a { font-size: 0.66rem; letter-spacing: 0.15em; }
    #modal-img { width: 280px; }
  }
  @media (max-width: 400px) {
    nav ul { gap: 0.9rem; }
    nav a { font-size: 0.6rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="header-title">Все на дно! <em>Дно-о-о-о-оо!</em></h1>
    <p class="header-sub">Подземное озеро хранит тайны — и теперь хранит марки.</p>
  </div>
</header>

<nav>
  <ul>
    <li><a href="index.html">Главная</a></li>
    <li><a href="stamps.html" class="active">Коллекция марок</a></li>
    <li><a href="game.html">Сундук</a></li>
  </ul>
</nav>

<p class="page-intro">Они расплываются в тёмных водах… но их всё-таки можно поймать.</p>

<div id="stamp-field"></div>

<div id="modal">
  <div id="modal-inner">
    <button id="modal-close">✕</button>
    <img id="modal-img" src="" alt="">
    <div class="modal-sep"></div>
    <div id="modal-name"></div>
    <div id="modal-role"></div>
  </div>
</div>

<footer>© Подарок ко Дню Слизерина 2025 · С любовью от Когтеврана</footer>

<script>
// ─── STAMP DATA (46 заглушек) ───────────────
const PH = "/sly/2026/stamps/s_э.блекфорд.png";
const stamps = [
  { src: PH, name: "Вестендорф", role: "Декан факультета Слизерин" },
  ...Array.from({length: 45}, (_,i) => ({ src: PH, name: `Имя Фамилия ${i+2}`, role: "Должность" }))
];

// ─── PHYSICS ────────────────────────────────
const FLEE_R    = 150;    // радиус реакции на курсор
const FLEE_F    = 0.6;    // мягкий толчок — плавное уплывание
const FRICTION  = 0.985;  // высокое трение — долго скользят, но плавно
const HOME_F    = 0.003;  // очень медленный возврат
const MAX_DRIFT = 130;    // далеко уплывают
const MAX_SPEED = 2.0;    // низкая макс. скорость — никаких рывков

const field = document.getElementById('stamp-field');
const stampObjs = [];
let mouseX = -9999, mouseY = -9999;
let fleeFrozen = false;
let tickRunning = false;

// ─── BUILD: равномерная сетка с центрированием ───
function build() {
  field.innerHTML = '';
  stampObjs.length = 0;

  const fw = document.body.clientWidth || window.innerWidth;

  // Горизонтальные отступы — марки не прижимаются к краям
  const SIDE_PAD = Math.round(fw * 0.08); // 8% с каждой стороны
  const usableW = Math.min(fw - SIDE_PAD * 2, 1200); // максимум 1200px
  const realOffsetX = (fw - usableW) / 2; // центрируем ограниченную область

  // Определяем базовый размер марки
  const BASE_COLS = usableW < 380 ? 3 : usableW < 600 ? 4 : usableW < 850 ? 5 : 6;
  const STAMP_W = Math.round(Math.min(usableW / 7 * 0.72, 145));
  const STAMP_H = Math.round(STAMP_W * 1.42);

  const gapY = STAMP_H * 1.55;
  const offsetX = realOffsetX;

  // Чередование колонок: 7, 6, 5, 6, 7, 6, 5, 6…
  const colPattern = [7, 6, 5, 6];

  // Распределяем марки по рядам с переменным числом колонок
  const rows = []; // [{cols, stamps: [...]}]
  let idx = 0;
  let patIdx = 0;
  while (idx < stamps.length) {
    const cols = colPattern[patIdx % colPattern.length];
    const count = Math.min(cols, stamps.length - idx);
    rows.push({ cols, count, startIdx: idx });
    idx += count;
    patIdx++;
  }

  const totalH = rows.length * gapY + gapY * 0.7;
  field.style.width  = '100%';
  field.style.height  = totalH + 'px';

  rows.forEach((rowInfo, rowIdx) => {
    const { cols, count, startIdx } = rowInfo;
    // Ширина ячейки для этого ряда — центрируем ряд
    const rowGapX = usableW / cols;

    for (let c = 0; c < count; c++) {
      const stamp = stamps[startIdx + c];

      // Позиция: центр ячейки
      const homeX = offsetX + c * rowGapX + (rowGapX - STAMP_W) / 2;
      const homeY = rowIdx * gapY + (c % 2 === 1 ? gapY * 0.28 : 0) + gapY * 0.2;

      // Лёгкий случайный разброс для натуральности
      const jitterX = (Math.random() - 0.5) * rowGapX * 0.15;
      const jitterY = (Math.random() - 0.5) * gapY * 0.1;
      const finalHomeX = homeX + jitterX;
      const finalHomeY = homeY + jitterY;

      const rot = (Math.random() - 0.5) * 14;

      // Вариация размера — от базового до +60% крупнее
      const sizeScale = 1.0 + Math.random() * 0.6;
      const sw = Math.round(STAMP_W * sizeScale);
      const sh = Math.round(STAMP_H * sizeScale);

      // Волновые параметры
      const waveDur = (7 + Math.random() * 5).toFixed(1);
      const waveDelay = (Math.random() * -12).toFixed(1);
      const waveDx = (2 + Math.random() * 3).toFixed(1);
      const waveY1 = (-3 - Math.random() * 5).toFixed(1);
      const waveY2 = (-1 - Math.random() * 3).toFixed(1);
      const waveTilt = (0.5 + Math.random() * 1.0).toFixed(2);

      const el = document.createElement('div');
      el.className = 'stamp-item';
      el.style.cssText = `
        width: ${sw}px;
        left: ${finalHomeX}px;
        top: ${finalHomeY}px;
        --rot: ${rot}deg;
        --wave-dx: ${waveDx}px;
        --wave-y1: ${waveY1}px;
        --wave-y2: ${waveY2}px;
        --wave-tilt: ${waveTilt}deg;
        animation: waveBob ${waveDur}s ease-in-out ${waveDelay}s infinite;
      `;

      const img = document.createElement('img');
      img.src = stamp.src;
      img.alt = stamp.name;
      img.draggable = false;
      el.appendChild(img);
      field.appendChild(el);

      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        fleeFrozen = true;
        openModal(stamp);
        setTimeout(() => { fleeFrozen = false; }, 300);
      });
      stampObjs.push({
        el, homeX: finalHomeX, homeY: finalHomeY,
        px: finalHomeX, py: finalHomeY,
        vx: 0, vy: 0, sw, sh,
        displaced: false
      });
    }
  });

  if (!tickRunning) {
    tickRunning = true;
    requestAnimationFrame(tick);
  }
}

window.addEventListener('load', build);

// Перестроить при ресайзе
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(build, 250);
});

// ─── MOUSE ──────────────────────────────────
document.addEventListener('mousemove', e => {
  mouseX = e.pageX;
  mouseY = e.pageY - field.offsetTop;
});
document.addEventListener('mouseleave', () => { mouseX = -9999; mouseY = -9999; });

// ─── PHYSICS TICK ───────────────────────────
function tick() {
  stampObjs.forEach(s => {
    const cx = s.px + s.sw / 2;
    const cy = s.py + s.sh / 2;

    const dx = cx - mouseX;
    const dy = cy - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);

    // Отталкивание — мягкое и плавное
    if (!fleeFrozen && dist < FLEE_R && dist > 1) {
      const strength = Math.pow(1 - dist / FLEE_R, 1.3);
      s.vx += (dx / dist) * strength * FLEE_F;
      s.vy += (dy / dist) * strength * FLEE_F;
    }

    // Возврат домой — очень мягкое «течение» обратно
    const offX = s.px - s.homeX;
    const offY = s.py - s.homeY;
    const offD = Math.sqrt(offX * offX + offY * offY);

    if (offD > 0.5) {
      const pull = HOME_F + offD * 0.00006;
      s.vx -= offX * pull;
      s.vy -= offY * pull;
    }

    // Мягкая граница дрейфа
    if (offD > MAX_DRIFT) {
      const over = (offD - MAX_DRIFT) / MAX_DRIFT;
      s.vx -= offX * over * 0.015;
      s.vy -= offY * over * 0.015;
    }

    s.vx *= FRICTION;
    s.vy *= FRICTION;

    // Ограничение скорости — всё медленно и плавно
    const speed = Math.sqrt(s.vx * s.vx + s.vy * s.vy);
    if (speed > MAX_SPEED) {
      s.vx = (s.vx / speed) * MAX_SPEED;
      s.vy = (s.vy / speed) * MAX_SPEED;
    }

    if (Math.abs(s.vx) < 0.005) s.vx = 0;
    if (Math.abs(s.vy) < 0.005) s.vy = 0;

    s.px += s.vx;
    s.py += s.vy;

    const moving = Math.abs(s.vx) > 0.08 || Math.abs(s.vy) > 0.08;

    // Когда марка движется — позиционируем через JS, пауза CSS-волны
    if (moving || offD > 1.5) {
      s.el.style.animationPlayState = 'paused';
      s.el.style.left = s.px + 'px';
      s.el.style.top  = s.py + 'px';
      s.displaced = true;
    } else if (s.displaced) {
      // Вернулась — возобновляем покачивание
      s.el.style.left = s.homeX + 'px';
      s.el.style.top  = s.homeY + 'px';
      s.px = s.homeX;
      s.py = s.homeY;
      s.el.style.animationPlayState = 'running';
      s.displaced = false;
    }
  });

  requestAnimationFrame(tick);
}

// ─── MODAL ──────────────────────────────────
const modal  = document.getElementById('modal');
const mImg   = document.getElementById('modal-img');
const mName  = document.getElementById('modal-name');
const mRole  = document.getElementById('modal-role');
const mClose = document.getElementById('modal-close');

function openModal(stamp) {
  mImg.src = stamp.src;
  mName.textContent = stamp.name;
  mRole.textContent = stamp.role;
  modal.classList.add('open');
}
mClose.addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });

// ─── RIPPLE ─────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.closest('#modal')) return;
  for (let i = 0; i < 4; i++) {
    const ring = document.createElement('div');
    ring.className = 'ripple-ring';
    ring.style.left = e.clientX + 'px';
    ring.style.top  = e.clientY + 'px';
    const spread = 1 + i * 0.28;
    const maxW = Math.round((100 + Math.random() * 40) * spread);
    const maxH = Math.round(maxW * (0.28 + Math.random() * 0.08));
    ring.style.setProperty('--maxW', maxW + 'px');
    ring.style.setProperty('--maxH', maxH + 'px');
    ring.style.setProperty('--dur',  (1.1 + i * 0.22 + Math.random() * 0.15).toFixed(2) + 's');
    ring.style.setProperty('--delay',(i * 0.11).toFixed(2) + 's');
    ring.style.borderColor = `rgba(94,196,126,${(0.65 - i * 0.12).toFixed(2)})`;
    document.body.appendChild(ring);
    ring.addEventListener('animationend', () => ring.remove(), { once: true });
  }
});
</script>
</body>
</html>
